<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>懷念 秉榕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0d0d;
      --surface:#161616;
      --border: rgba(255,255,255,0.07);
      --cream:  #f0ece4;
      --muted:  rgba(240,236,228,0.45);
      --accent: #e8c98a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', 'Noto Serif TC', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.8s cubic-bezier(0.4,0,0.2,1);
    }
    .slide.active { opacity: 1; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0.75);
    }

    /* subtle vignette */
    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    #hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6rem;
      pointer-events: none;
    }

    #hero-name {
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      font-size: clamp(3rem, 9vw, 6.5rem);
      color: var(--cream);
      letter-spacing: 0.2em;
      text-shadow: 0 1px 30px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeUp 1.8s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
    }

    #hero-line {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 1.4rem 0;
      opacity: 0;
      animation: fadeUp 1.8s ease 0.7s forwards;
    }

    #hero-sub {
      font-weight: 300;
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      color: var(--accent);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1.8s ease 0.9s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* scroll hint arrow */
    #scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 2s ease 2s forwards;
    }
    #scroll-hint span {
      display: block;
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--muted));
    }

    /* ─── SECTION HEADER ─── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 5rem 2rem 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-header::before,
    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-header h2 {
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.5em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ─── GALLERY ─── */
    #gallery {
      padding: 0 1.5rem 6rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .masonry {
      columns: 3;
      column-gap: 8px;
    }
    @media (max-width: 900px) { .masonry { columns: 2; } }
    @media (max-width: 500px) { .masonry { columns: 1; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 8px;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), filter 0.6s ease;
      filter: brightness(0.88) saturate(0.9);
    }

    .masonry-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.4s ease;
    }

    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(1) saturate(1.05);
    }
    .masonry-item:hover::after {
      background: rgba(0,0,0,0.08);
    }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 2px;
    }

    .lb-btn {
      position: absolute;
      background: none;
      border: 1px solid var(--border);
      color: var(--cream);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-btn:hover { border-color: var(--accent); color: var(--accent); }

    #lb-close { top: 1.5rem; right: 1.5rem; }
    #lb-prev  { top: 50%; left: 1.5rem;  transform: translateY(-50%); }
    #lb-next  { top: 50%; right: 1.5rem; transform: translateY(-50%); }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 3rem 1rem 4rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      border-top: 1px solid var(--border);
    }

    .placeholder-msg {
      text-align: center;
      color: var(--muted);
      padding: 4rem 1rem;
      font-size: 1rem;
      line-height: 2;
    }
  </style>
</head>
<body>

<section id="hero">
  <div id="hero-overlay">
    <div id="hero-name">秉榕</div>
    <div id="hero-line"></div>
    <div id="hero-sub">永遠懷念</div>
  </div>
  <div id="scroll-hint"><span></span></div>
</section>

<div class="section-header"><h2>珍貴回憶</h2></div>

<section id="gallery">
  <div class="masonry" id="masonry-grid"></div>
</section>

<div id="lightbox">
  <button class="lb-btn" id="lb-close" aria-label="Close">✕</button>
  <button class="lb-btn" id="lb-prev"  aria-label="Previous">‹</button>
  <img id="lb-img" src="" alt="memorial photo" />
  <button class="lb-btn" id="lb-next"  aria-label="Next">›</button>
</div>

<footer>為神的榮耀，在主裡永遠為你點亮一盞燈。</footer>

<script>
  const PHOTOS = [
    '0431dc4b1524fa0007063bfaf46f3007.jpg',
    '20150301_with_Ethan.jpg',
    '20E301C3E525929CB225BB2830B2F2AB1501BE70.JPG',
    '3336291fd3b4666560bf78afbbffa9b5.jpg',
    '710db917f28fb5a47e0ed9c9220960f7.jpg',
    '7ccc4b70876b4d406a1d0773f5208965.jpeg',
    'IMG_0451.JPG',
    'IMG_0665.JPG',
    'IMG_1031.JPG',
    'IMG_1074.jpeg',
    'IMG_1304.jpeg',
    'IMG_1478.jpeg',
    'IMG_1541.JPG',
    'IMG_1542.JPG',
    'IMG_1543.JPG',
    'IMG_1547.JPG',
    'IMG_1548.JPG',
    'IMG_1549.JPG',
    'IMG_1550.JPG',
    'IMG_2603.jpg',
    'IMG_2824.jpeg',
    'IMG_5316.jpg',
    'IMG_5320.jpg',
    'IMG_5321.jpg',
    'IMG_5322.jpg',
    'IMG_5323.jpg',
    'IMG_5324.jpg',
    'IMG_5783.JPG',
    'IMG_5784.JPG',
    'IMG_5785.JPG',
    'IMG_7084.jpeg',
    'IMG_8009.jpg',
    'IMG_8554.jpg',
    'IMG_8841.jpeg',
    'IMG_9048.JPG',
    'IMG_9050.JPG',
    'July03_2022.jpg',
    'May22_2016.jpg',
    'PXL_20251122_172314278.MP.jpg',
    'PXL_20251122_172411325.MP.jpg',
    'ThanksGiving2025.jpg',
    'With_Elaine_July_2022.jpg',
    'd9449f22c35f07b8b9ecd299a07834.jpg',
    'e7598198f17bb93e280ac651f1baca33.jpg',
    'ed07cf7bdf416e85f5c434aa58291eed.jpg',
    'fb52577d3f020e0cb4f463867da995.jpg',
    '方家1.jpg',
    '方家2.png',
    '良师益友.jpg',
    '陆 Aug 2023.jpeg',
  ];

  const SLIDE_DELAY = 5000;

  const hero   = document.getElementById('hero');
  const grid   = document.getElementById('masonry-grid');

  function makeImg(filename) {
    const img = document.createElement('img');
    img.src     = 'photos/' + filename;
    img.alt     = '';
    img.loading = 'lazy';
    return img;
  }

  function buildPage() {
    if (!PHOTOS.length) {
      const msg = document.createElement('div');
      msg.className = 'placeholder-msg';
      msg.textContent = '請將照片放入 photos/ 資料夾，並在 index.html 的 PHOTOS 陣列中填入檔名。';
      grid.appendChild(msg);
      return;
    }

    const heroPhotos = [...PHOTOS].sort(() => Math.random() - 0.5);
    let current = 0;

    heroPhotos.forEach((filename, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      slide.appendChild(makeImg(filename));
      hero.insertBefore(slide, document.getElementById('hero-overlay'));
    });

    const slides = hero.querySelectorAll('.slide');

    function goToSlide(n) {
      slides[current].classList.remove('active');
      current = n;
      slides[current].classList.add('active');
    }

    setInterval(() => goToSlide((current + 1) % heroPhotos.length), SLIDE_DELAY);

    PHOTOS.forEach((filename, idx) => {
      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.appendChild(makeImg(filename));
      item.addEventListener('click', () => openLightbox(idx));
      grid.appendChild(item);
    });
  }

  let lbIndex = 0;
  const lb    = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');

  function openLightbox(idx) {
    lbIndex = idx;
    lbImg.src = 'photos/' + PHOTOS[idx];
    lb.classList.add('open');
  }

  document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
  document.getElementById('lb-prev').addEventListener('click', () => {
    lbIndex = (lbIndex - 1 + PHOTOS.length) % PHOTOS.length;
    lbImg.src = 'photos/' + PHOTOS[lbIndex];
  });
  document.getElementById('lb-next').addEventListener('click', () => {
    lbIndex = (lbIndex + 1) % PHOTOS.length;
    lbImg.src = 'photos/' + PHOTOS[lbIndex];
  });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     lb.classList.remove('open');
    if (e.key === 'ArrowLeft')  document.getElementById('lb-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
  });

  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });

  buildPage();
</script>
</body>
</html>
